<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Liga de Verão Europa</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body {
  font-family: 'Segoe UI', Arial;

  background:
    radial-gradient(circle at 50% -10%, rgba(255,255,255,0.15), transparent 60%),
    radial-gradient(circle at bottom, rgba(0,0,0,0.5), transparent 60%),
    url("img/bilhar1.png") left 100px no-repeat,
    url("img/bilhar2.png") right 120px no-repeat,
    url("https://www.transparenttextures.com/patterns/felt.png");

  background-size: auto, auto, 240px, 240px, auto;
  background-color:#065f46;

  color:#f8fafc;
  padding:15px;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  pointer-events:none;
  z-index:0;
}

#app, .logo, h1, .card{
  position:relative;
  z-index:1;
}

.logo{
  display:block;
  margin:0 auto 10px auto;
  width:160px;
  border-radius:14px;
  box-shadow:0 0 0 2px rgba(250,204,21,0.25),0 0 25px rgba(250,204,21,0.25),0 10px 25px rgba(0,0,0,0.6);
  background:rgba(0,0,0,0.3);
  padding:6px;
}

h1{text-align:center;color:#facc15;margin-bottom:15px;}

#adminBtn{
  position:fixed;
  top:10px;
  right:10px;
  background:none;
  border:none;
  color:#94a3b8;
  opacity:0.5;
  z-index:2;
}

.card{
  background:rgba(15,23,42,0.55);
  backdrop-filter:blur(10px);
  border-radius:16px;
  padding:15px;
  margin-bottom:20px;
  border:1px solid rgba(250,204,21,0.15);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.jogo{
  display:flex;
  justify-content:space-between;
  background:rgba(2,6,23,0.8);
  padding:10px;
  border-radius:10px;
  margin-bottom:6px;
}

.vencedor{ color:#22c55e; font-weight:bold;}
.derrotado{ color:#ef4444; }

input{
  width:42px;
  text-align:center;
  background:#1e293b;
  border:1px solid #334155;
  color:white;
  border-radius:6px;
}

table{width:100%;border-collapse:collapse;}
th{background:#020617;color:#facc15;}
td,th{padding:10px;text-align:center;}

.top1 td{background:rgba(250,204,21,0.12);color:#fef08a;}
.top2 td{background:rgba(148,163,184,0.12);}
.top3 td{background:rgba(180,83,9,0.12);color:#fdba74;}
.top td{background:rgba(37,99,235,0.06);}

.seta-up{color:#4ade80;margin-left:6px;font-size:12px;}
.seta-down{color:#f87171;margin-left:6px;font-size:12px;}

</style>
</head>

<body>

<button id="adminBtn" onclick="login()">⚙️</button>

<img src="FB_IMG_1775512103606.jpg" class="logo">
<h1>LIGA DE VERÃO EUROPA</h1>

<div id="app"></div>

<script>

const PASSWORD="1234";
let editavel=false;
let posicoesAnteriores={};

function login(){
let p=prompt("Código operador:");
if(p===PASSWORD){
editavel=true;
render();
}
}

const firebaseConfig={
apiKey:"AIzaSyCH2x07uqd8f9Move6duv4NYCEx3SKacjQ",
authDomain:"liga-verao-salaoeuropa.firebaseapp.com",
databaseURL:"https://liga-verao-salaoeuropa-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"liga-verao-salaoeuropa"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const jogadores=[
"Filipe Soares","Pinto","P.Magalhães","Nelson","Rosas","R.Dias",
"R.Martins","Guilherme","Fábio","João Pinto","Jorge Pinheiro","Ismael",
"Ricardo da Costa","Nuno Oliveira","Ricardo Silva","Gesto","Carlos Leal","Zé Vieira",
"Ruben Pereira","Flávio","Sérgio Filipe","Santiago","Paulo Martins","Nuno Continental",
"Jogador25","Jogador26"
];

function gerarJornadas(lista){
let arr=[...lista];
let jornadas=[];
if(arr.length%2!==0)arr.push(null);

for(let i=0;i<arr.length-1;i++){
let jornada=[];
for(let j=0;j<arr.length/2;j++){
let a=arr[j];
let b=arr[arr.length-1-j];
if(a&&b)jornada.push([a,b]);
}
arr.splice(1,0,arr.pop());
jornadas.push(jornada);
}
return jornadas;
}

const jornadas=gerarJornadas(jogadores);
let dados={};

db.ref("bilhar").on("value",snap=>{
dados=snap.val()||{};
render();
});

function guardar(){
if(!editavel)return;
document.querySelectorAll("input").forEach(i=>{
dados[i.dataset.id]=i.value;
});
db.ref("bilhar").set(dados);
}

function confrontoDireto(a,b){
for(let j=0;j<jornadas.length;j++){
for(let i=0;i<jornadas[j].length;i++){

let jogo=jornadas[j][i];

if(
(jogo[0]===a.nome && jogo[1]===b.nome) ||
(jogo[0]===b.nome && jogo[1]===a.nome)
){

let aScore=dados[`${j}-${i}-1`];
let bScore=dados[`${j}-${i}-2`];

if(aScore!=="" && bScore!==""){

let va=Number(aScore);
let vb=Number(bScore);

if(jogo[0]===a.nome){
if(va>vb)return -1;
if(vb>va)return 1;
}else{
if(vb>va)return -1;
if(va>vb)return 1;
}

}

}
}
}
return 0;
}

function render(){

let html="";

html+=`<div class="card"><h2>🏆 Classificação</h2>
<table id="class">
<tr><th>#</th><th>Jogador</th><th>JG</th><th>V</th><th>D</th><th>PG</th><th>PP</th><th>DP</th><th>Pts</th></tr>
</table></div>`;

jornadas.forEach((jornada,j)=>{
html+=`<div class="card"><h3>Jornada ${j+1}</h3>`;

jornada.forEach((jogo,i)=>{
let p1=jogo[0];
let p2=jogo[1];

let a=dados[`${j}-${i}-1`]||"";
let b=dados[`${j}-${i}-2`]||"";

let c1="",c2="";

if(a!=="" && b!==""){
if(Number(a)>Number(b)){
c1="vencedor";
c2="derrotado";
}else if(Number(b)>Number(a)){
c2="vencedor";
c1="derrotado";
}
}

html+=`
<div class="jogo">
<span class="${c1}">${p1}</span>
<div>
<input data-id="${j}-${i}-1" value="${a}">
-
<input data-id="${j}-${i}-2" value="${b}">
</div>
<span class="${c2}">${p2}</span>
</div>`;
});

html+="</div>";
});

document.getElementById("app").innerHTML=html;

document.querySelectorAll("input").forEach(i=>{
i.disabled=!editavel;
i.oninput=guardar;
});

calcular();
}

function calcular(){

let stats={};

jogadores.forEach(j=>{
stats[j]={jg:0,v:0,d:0,pg:0,pp:0,dp:0,pts:0};
});

jornadas.forEach((jornada,j)=>{
jornada.forEach((jogo,i)=>{

let p1=jogo[0];
let p2=jogo[1];

let a=dados[`${j}-${i}-1`];
let b=dados[`${j}-${i}-2`];

if(a!==""&&b!==""){
let va=Number(a),vb=Number(b);

stats[p1].jg++;
stats[p2].jg++;

stats[p1].pg+=va;
stats[p1].pp+=vb;

stats[p2].pg+=vb;
stats[p2].pp+=va;

stats[p1].dp = stats[p1].pg - stats[p1].pp;
stats[p2].dp = stats[p2].pg - stats[p2].pp;

if(va>vb){
stats[p1].v++;stats[p2].d++;stats[p1].pts+=3;
}else{
stats[p2].v++;stats[p1].d++;stats[p2].pts+=3;
}
}

});
});

let lista=Object.keys(stats).map(n=>({nome:n,...stats[n]}));

lista.sort((a,b)=>{
if(b.pts!==a.pts)return b.pts-a.pts;

// 🔥 PRIORIDADE DP
if(b.dp!==a.dp)return b.dp-a.dp;

// 🔥 DEPOIS CONFRONTO DIRETO
let cd=confrontoDireto(a,b);
if(cd!==0)return cd;

return 0;
});

let novaPosicao={};
let t=document.getElementById("class");

t.innerHTML="<tr><th>#</th><th>Jogador</th><th>JG</th><th>V</th><th>D</th><th>PG</th><th>PP</th><th>DP</th><th>Pts</th></tr>";

lista.forEach((j,i)=>{

let classe="";
if(i===0)classe="top1";
else if(i===1)classe="top2";
else if(i===2)classe="top3";
else if(i<8)classe="top";

let seta="";

if(posicoesAnteriores[j.nome]!==undefined){
let antiga=posicoesAnteriores[j.nome];
if(i<antiga)seta=`<span class="seta-up">▲</span>`;
else if(i>antiga)seta=`<span class="seta-down">▼</span>`;
}

novaPosicao[j.nome]=i;

t.innerHTML+=`
<tr class="${classe}">
<td>${i+1}</td>
<td>${j.nome} ${seta}</td>
<td>${j.jg}</td>
<td>${j.v}</td>
<td>${j.d}</td>
<td>${j.pg}</td>
<td>${j.pp}</td>
<td>${j.dp}</td>
<td>${j.pts}</td>
</tr>`;
});

posicoesAnteriores=novaPosicao;
}

</script>

</body>
</html>
