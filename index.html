<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Liga de Bilhar</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

/* 🎱 FUNDO ULTRA REALISTA */
body {
  font-family: 'Segoe UI', Arial;

  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.12), transparent 50%),
    radial-gradient(circle at top, rgba(250,204,21,0.08), transparent 40%),
    url("https://www.transparenttextures.com/patterns/felt.png");

  background-color:#065f46;

  color: #e2e8f0;
  padding: 15px;
  position:relative;
  overflow-x:hidden;
}

/* 🎱 BOLAS REALISTAS */
body::before{
  content:"";
  position:fixed;
  top:70px;
  left:-20px;
  width:180px;
  height:180px;

  background:url("https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Pool_balls_set.png/512px-Pool_balls_set.png") no-repeat center/contain;

  opacity:0.18;
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
  pointer-events:none;
}

/* 🎱 TACOS REALISTAS */
body::after{
  content:"";
  position:fixed;
  top:120px;
  right:-30px;
  width:220px;
  height:400px;

  background:url("https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Pool_cue.png/512px-Pool_cue.png") no-repeat center/contain;

  opacity:0.15;
  filter: drop-shadow(0 15px 20px rgba(0,0,0,0.7));
  transform:rotate(-15deg);
  pointer-events:none;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:20px;
}

.logo{
  width:140px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(250,204,21,0.5);
}

h1{
  font-size:26px;
  color:#facc15;
  text-shadow:0 0 10px rgba(250,204,21,0.4);
}

/* BOTÃO */
#adminBtn{
  position:fixed;
  top:10px;
  right:10px;
  background:none;
  border:none;
  color:#94a3b8;
  opacity:0.4;
}

/* 🔥 CARDS PREMIUM */
.card{
  background: rgba(2,6,23,0.88);
  border-radius:16px;
  padding:15px;
  margin-bottom:20px;

  border:1px solid rgba(250,204,21,0.25);

  box-shadow:
    0 0 0 1px rgba(250,204,21,0.1),
    0 8px 25px rgba(0,0,0,0.7),
    0 0 20px rgba(250,204,21,0.08);
}

/* JOGOS */
.jogo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: rgba(15,23,42,0.7);
  padding:10px;
  border-radius:10px;
  margin-bottom:6px;
}

/* RESULTADOS */
.vencedor{ color:#22c55e; font-weight:bold;}
.derrotado{ color:#ef4444; }

/* INPUT */
input{
  width:42px;
  text-align:center;
  background:#1e293b;
  border:1px solid #334155;
  color:white;
  border-radius:6px;
}

/* TABELA */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#020617;
  color:#facc15;
}

td,th{
  padding:10px;
  text-align:center;
}

td{
  background:#020617;
}

/* TOPS */
.top1 td{ background:rgba(250,204,21,0.15); color:#facc15;}
.top2 td{ background:rgba(148,163,184,0.15); color:#cbd5f5;}
.top3 td{ background:rgba(180,83,9,0.15); color:#fdba74;}
.top8 td{ background:rgba(37,99,235,0.08);}

/* SETAS */
.seta-up{ color:#4ade80; margin-left:6px; font-size:12px;}
.seta-down{ color:#f87171; margin-left:6px; font-size:12px;}

</style>
</head>

<body>

<button id="adminBtn" onclick="login()">⚙️</button>

<div class="header">
  <img src="FB_IMG_1775512103606.jpg" class="logo">
  <h1>LIGA DE VERÃO EUROPA</h1>
</div>

<div id="app"></div>

<script>

const PASSWORD="1234";
let editavel=false;

function login(){
let p=prompt("Código operador:");
if(p===PASSWORD){
editavel=true;
alert("Modo operador ativo");
render();
}
}

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCH2x07uqd8f9Move6duv4NYCEx3SKacjQ",
  authDomain: "liga-verao-salaoeuropa.firebaseapp.com",
  databaseURL: "https://liga-verao-salaoeuropa-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "liga-verao-salaoeuropa"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// JOGADORES
const jogadores=[
"Filipe Soares","Pinto","P.Magalhães","Nelson","Rosas","R.Dias",
"R.Martins","Guilherme","Fábio","João Pinto","Jorge Pinheiro","Ismael",
"Ricardo da Costa","Nuno Oliveira","Ricardo Silva","Gesto","Carlos Leal","Zé Vieira",
"Ruben Pereira","Flávio","Sérgio Filipe","Santiago","Paulo Martins","Nuno Continental",
"Jogador25","Jogador26"
];

// GERAR JORNADAS
function gerarJornadas(lista){
let arr=[...lista];
let jornadas=[];
if(arr.length%2!==0)arr.push(null);

for(let i=0;i<arr.length-1;i++){
let jornada=[];
for(let j=0;j<arr.length/2;j++){
let a=arr[j];
let b=arr[arr.length-1-j];
if(a && b) jornada.push([a,b]);
}
arr.splice(1,0,arr.pop());
jornadas.push(jornada);
}
return jornadas;
}

const jornadas=gerarJornadas(jogadores);

let dados={};
let ultimaClassificacao={};

db.ref("bilhar").on("value",snap=>{
dados=snap.val()||{};
render();
},()=>{render();});

function render(){

let html="";

html+=`
<div class="card">
<h2>🏆 Classificação</h2>
<table id="class">
<tr><th>#</th><th>Jogador</th><th>JG</th><th>V</th><th>D</th><th>Pts</th></tr>
</table>
</div>`;

// JORNADAS
jornadas.forEach((jornada,j)=>{
html+=`<div class="card"><h3>Jornada ${j+1}</h3>`;

jornada.forEach((jogo,i)=>{
let p1=jogo[0];
let p2=jogo[1];

let a=dados[`${j}-${i}-1`]||"";
let b=dados[`${j}-${i}-2`]||"";

html+=`
<div class="jogo">
<span>${p1}</span>
<div>
<input data-id="${j}-${i}-1" value="${a}">
-
<input data-id="${j}-${i}-2" value="${b}">
</div>
<span>${p2}</span>
</div>`;
});

html+="</div>";
});

document.getElementById("app").innerHTML=html;

document.querySelectorAll("input").forEach(i=>{
i.disabled=!editavel;
i.oninput=guardar;
});

calcular();
}

function guardar(){
if(!editavel)return;
document.querySelectorAll("input").forEach(i=>{
dados[i.dataset.id]=i.value;
});
db.ref("bilhar").set(dados);
}

function calcular(){

let stats={};

jogadores.forEach(j=>{
stats[j]={jg:0,v:0,d:0,pts:0};
});

let lista = jogadores.map(nome => ({
  nome,
  ...(stats[nome] || {jg:0,v:0,d:0,pts:0})
}));

lista.sort((a,b)=>b.pts-a.pts);

let t=document.getElementById("class");

t.innerHTML="<tr><th>#</th><th>Jogador</th><th>JG</th><th>V</th><th>D</th><th>Pts</th></tr>";

lista.forEach((j,i)=>{

let classe="";
let medalha="";
let seta="";

let antiga = ultimaClassificacao[j.nome];

if(antiga !== undefined){
  if(i < antiga) seta=`<span class="seta-up">▲</span>`;
  else if(i > antiga) seta=`<span class="seta-down">▼</span>`;
}

if(i===0){classe="top1"; medalha="🥇";}
else if(i===1){classe="top2"; medalha="🥈";}
else if(i===2){classe="top3"; medalha="🥉";}
else if(i<8){classe="top8";}

t.innerHTML+=`
<tr class="${classe}">
<td>${medalha || i+1}</td>
<td>${j.nome} ${seta}</td>
<td>${j.jg}</td>
<td>${j.v}</td>
<td>${j.d}</td>
<td>${j.pts}</td>
</tr>`;
});

ultimaClassificacao={};
lista.forEach((j,i)=>{
ultimaClassificacao[j.nome]=i;
});

}

</script>

</body>
</html>
