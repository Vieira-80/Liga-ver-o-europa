<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Liga de Bilhar</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

/* FUNDO */
body {
  font-family: 'Segoe UI', Arial;
  background:
    radial-gradient(circle at top, rgba(250,204,21,0.12), transparent 40%),
    linear-gradient(135deg, #020617, #022c22 60%, #064e3b);
  color: #e2e8f0;
  padding: 15px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:20px;
}

.logo{
  width:140px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(250,204,21,0.4);
}

h1{
  font-size:26px;
  color:#facc15;
}

/* CARDS */
.card{
  background: rgba(2,6,23,0.85);
  border-radius:16px;
  padding:15px;
  margin-bottom:20px;
}

/* TABELA */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  color:#facc15;
}

td,th{
  padding:10px;
  text-align:center;
}

/* TOPS SUAVES */
.top1 td{ background:rgba(250,204,21,0.15); color:#facc15;}
.top2 td{ background:rgba(148,163,184,0.15); color:#cbd5f5;}
.top3 td{ background:rgba(180,83,9,0.15); color:#fdba74;}
.top8 td{ background:rgba(37,99,235,0.08);}

/* SETAS SUAVES */
.seta-up{
  color:#4ade80; /* verde suave */
  margin-left:6px;
  font-size:12px;
}

.seta-down{
  color:#f87171; /* vermelho suave */
  margin-left:6px;
  font-size:12px;
}

/* ANIMAÇÃO */
.animar{
  animation: fade 0.4s ease;
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}

</style>
</head>

<body>

<div class="header">
  <img src="FB_IMG_1775512103606.jpg" class="logo">
  <h1>LIGA DE VERÃO EUROPA</h1>
</div>

<div id="app"></div>

<script>

let ultimaClassificacao = {};

const firebaseConfig = {
  apiKey: "AIzaSyCH2x07uqd8f9Move6duv4NYCEx3SKacjQ",
  authDomain: "liga-verao-salaoeuropa.firebaseapp.com",
  databaseURL: "https://liga-verao-salaoeuropa-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "liga-verao-salaoeuropa"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const jogadores=[
"Filipe Soares","Pinto","P.Magalhães","Nelson","Rosas","R.Dias",
"R.Martins","Guilherme","Fábio","João Pinto","Jorge Pinheiro","Ismael",
"Ricardo da Costa","Nuno Oliveira","Ricardo Silva","Gesto","Carlos Leal","Zé Vieira",
"Ruben Pereira","Flávio","Sérgio Filipe","Santiago","Paulo Martins","Nuno Continental",
"Jogador25","Jogador26"
];

function gerarJornadas(lista){
let arr=[...lista];
let jornadas=[];
if(arr.length%2!==0)arr.push(null);

for(let i=0;i<arr.length-1;i++){
let jornada=[];
for(let j=0;j<arr.length/2;j++){
let a=arr[j];
let b=arr[arr.length-1-j];
if(a && b) jornada.push([a,b]);
}
arr.splice(1,0,arr.pop());
jornadas.push(jornada);
}
return jornadas;
}

const jornadas=gerarJornadas(jogadores);

let dados={};

db.ref("bilhar").on("value",snap=>{
dados=snap.val()||{};
render();
},()=>{render();});

setTimeout(render,1000);

function render(){

let html=`
<div class="card">
<h2>🏆 Classificação</h2>
<table id="class">
<tr><th>#</th><th>Jogador</th><th>Pts</th></tr>
</table>
</div>`;

document.getElementById("app").innerHTML=html;

calcular();
}

function calcular(){

let stats={};

jogadores.forEach(j=>{
stats[j]={pts:0};
});

let lista = jogadores.map(nome => ({
  nome,
  ...(stats[nome] || {pts:0})
}));

lista.sort((a,b)=>b.pts-a.pts);

let t=document.getElementById("class");
t.innerHTML="<tr><th>#</th><th>Jogador</th><th>Pts</th></tr>";

lista.forEach((j,i)=>{

let classe="";
let medalha="";
let seta="";

let antiga = ultimaClassificacao[j.nome];

if(antiga !== undefined){
  if(i < antiga) seta=`<span class="seta-up">▲</span>`;
  else if(i > antiga) seta=`<span class="seta-down">▼</span>`;
}

if(i===0){classe="top1"; medalha="🥇";}
else if(i===1){classe="top2"; medalha="🥈";}
else if(i===2){classe="top3"; medalha="🥉";}
else if(i<8){classe="top8";}

t.innerHTML+=`
<tr class="${classe} animar">
<td>${medalha || i+1}</td>
<td>${j.nome} ${seta}</td>
<td>${j.pts}</td>
</tr>`;
});

ultimaClassificacao={};
lista.forEach((j,i)=>{
ultimaClassificacao[j.nome]=i;
});

}

</script>

</body>
</html>
