<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Liga de Bilhar</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

/* FUNDO */
body {
  font-family: 'Segoe UI', Arial;
  background: radial-gradient(circle at top, #065f46, #022c22);
  color: #f8fafc;
  padding: 15px;
}

/* 🎱 TRIÂNGULO REAL (SEM BUGS) */
.decoracao {
  position: fixed;
  top: 80px;
  left: 20px;
  width: 140px;
  opacity: 0.15;
  pointer-events: none;
}

/* HEADER */
.logo{
  display:block;
  margin:0 auto 10px auto;
  width:160px;
}

h1 {
  text-align:center;
  color:#facc15;
  margin-bottom:15px;
}

/* BOTÃO */
#adminBtn{
  position:fixed;
  top:10px;
  right:10px;
  background:none;
  border:none;
  color:#94a3b8;
  opacity:0.5;
}

/* CARDS */
.card{
  background:rgba(15,23,42,0.85);
  border-radius:14px;
  padding:15px;
  margin-bottom:20px;
}

/* JOGOS */
.jogo{
  display:flex;
  justify-content:space-between;
  background:#020617;
  padding:10px;
  border-radius:8px;
  margin-bottom:6px;
}

/* RESULTADOS */
.vencedor{ color:#22c55e; font-weight:bold;}
.derrotado{ color:#ef4444; }

/* INPUT */
input{
  width:42px;
  text-align:center;
  background:#334155;
  border:none;
  color:white;
  border-radius:6px;
}

/* TABELA */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#020617;
  color:#facc15;
}

td,th{
  padding:10px;
  text-align:center;
}

/* TOP */
.top1{ background:#facc15; color:black;}
.top2{ background:#94a3b8; color:black;}
.top3{ background:#b45309; color:white;}
.top{ background:#1e3a8a;}

</style>
</head>

<body>

<!-- 🎱 IMAGEM TRIÂNGULO (FUNCIONA SEMPRE) -->
<img class="decoracao" src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Pool_balls_racked.jpg">

<button id="adminBtn" onclick="login()">⚙️</button>

<img src="FB_IMG_1775512103606.jpg" class="logo">
<h1>🎱 LIGA DE BILHAR 🎱</h1>

<div id="app"></div>

<script>

const PASSWORD="1234";
let editavel=false;

function login(){
let p=prompt("Código operador:");
if(p===PASSWORD){
editavel=true;
render();
}
}

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCH2x07uqd8f9Move6duv4NYCEx3SKacjQ",
  authDomain: "liga-verao-salaoeuropa.firebaseapp.com",
  databaseURL: "https://liga-verao-salaoeuropa-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "liga-verao-salaoeuropa"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// JOGADORES
const jogadores=[
"Filipe Soares","Pinto","P.Magalhães","Nelson","Rosas","R.Dias",
"R.Martins","Guilherme","Fábio","João Pinto","Jorge Pinheiro","Ismael",
"Ricardo da Costa","Nuno Oliveira","Ricardo Silva","Gesto","Carlos Leal","Zé Vieira",
"Ruben Pereira","Flávio","Sérgio Filipe","Santiago","Paulo Martins","Nuno Continental",
"Jogador25","Jogador26"
];

// JORNADAS
function gerarJornadas(lista){
let arr=[...lista];
let jornadas=[];
if(arr.length%2!==0)arr.push(null);

for(let i=0;i<arr.length-1;i++){
let jornada=[];
for(let j=0;j<arr.length/2;j++){
let a=arr[j];
let b=arr[arr.length-1-j];
if(a && b) jornada.push([a,b]);
}
arr.splice(1,0,arr.pop());
jornadas.push(jornada);
}
return jornadas;
}

const jornadas=gerarJornadas(jogadores);

let dados={};

db.ref("bilhar").on("value",snap=>{
dados=snap.val()||{};
render();
});

function guardar(){
if(!editavel)return;
document.querySelectorAll("input").forEach(i=>{
dados[i.dataset.id]=i.value;
});
db.ref("bilhar").set(dados);
}

function render(){

let html="";

// CLASSIFICAÇÃO
html+=`<div class="card"><h2>🏆 Classificação</h2>
<table id="class">
<tr><th>#</th><th>Jogador</th><th>JG</th><th>V</th><th>D</th><th>Pts</th></tr>
</table></div>`;

// JORNADAS
jornadas.forEach((jornada,j)=>{

html+=`<div class="card"><h3>Jornada ${j+1}</h3>`;

jornada.forEach((jogo,i)=>{

let p1=jogo[0];
let p2=jogo[1];

let a=dados[`${j}-${i}-1`]||"";
let b=dados[`${j}-${i}-2`]||"";

let c1="",c2="";
if(a!=="" && b!==""){
if(Number(a)>Number(b)){c1="vencedor";c2="derrotado";}
else if(Number(b)>Number(a)){c2="vencedor";c1="derrotado";}
}

html+=`
<div class="jogo">
<span class="${c1}">${p1}</span>
<div>
<input data-id="${j}-${i}-1" value="${a}">
-
<input data-id="${j}-${i}-2" value="${b}">
</div>
<span class="${c2}">${p2}</span>
</div>
`;

});

html+="</div>";

});

document.getElementById("app").innerHTML=html;

document.querySelectorAll("input").forEach(i=>{
i.disabled=!editavel;
i.oninput=guardar;
});

calcular();
}

// CLASSIFICAÇÃO
function calcular(){

let stats={};

jogadores.forEach(j=>{
stats[j]={jg:0,v:0,d:0,pts:0};
});

jornadas.forEach((jornada,j)=>{
jornada.forEach((jogo,i)=>{

let p1=jogo[0];
let p2=jogo[1];

let a=dados[`${j}-${i}-1`];
let b=dados[`${j}-${i}-2`];

if(a!=="" && b!==""){

let va=Number(a),vb=Number(b);

stats[p1].jg++;
stats[p2].jg++;

if(va>vb){
stats[p1].v++;
stats[p2].d++;
stats[p1].pts+=3;
}else{
stats[p2].v++;
stats[p1].d++;
stats[p2].pts+=3;
}

}

});
});

let lista=Object.keys(stats).map(n=>({nome:n,...stats[n]}));
lista.sort((a,b)=>b.pts-a.pts);

let t=document.getElementById("class");

t.innerHTML="<tr><th>#</th><th>Jogador</th><th>JG</th><th>V</th><th>D</th><th>Pts</th></tr>";

lista.forEach((j,i)=>{

let classe="";
if(i===0)classe="top1";
else if(i===1)classe="top2";
else if(i===2)classe="top3";
else if(i<8)classe="top";

t.innerHTML+=`
<tr class="${classe}">
<td>${i+1}</td>
<td>${j.nome}</td>
<td>${j.jg}</td>
<td>${j.v}</td>
<td>${j.d}</td>
<td>${j.pts}</td>
</tr>`;
});

}

</script>

</body>
</html>
